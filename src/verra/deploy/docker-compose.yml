services:
  ollama:
    image: ollama/ollama:latest
    container_name: verra-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  atlas:
    image: python:3.13-slim
    container_name: verra-api
    ports:
      - "127.0.0.1:${ATLAS_PORT:-8484}:8484"
    volumes:
      - verra_data:/data
    environment:
      - VERRA_HOME=/data
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    # Install verra-one from PyPI then start the server.
    # Replace with a proper image tag once published.
    command:
      - /bin/sh
      - -c
      - |
        pip install --quiet "verra-one==0.1.0" && \
        verra serve --host 0.0.0.0 --port 8484

volumes:
  ollama_data:
  verra_data:
